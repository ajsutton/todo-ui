<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TODOs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>TODOs</h1>
      <span id="connection-status" class="status-indicator"></span>
    </div>
    <div class="actions">
      <button id="pending-badge" class="btn pending-badge hidden" title="New items found by auto-update">
        <span id="pending-count">0</span> pending
      </button>
      <span id="last-update" class="last-update"></span>
      <a id="show-log" href="#" title="Update log">View Log</a>
      <div class="update-action">
        <button id="refresh-all" class="btn">Update All</button>
        <div id="update-progress" class="update-progress hidden">
          <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
          <span id="progress-label" class="progress-label"></span>
        </div>
      </div>
    </div>
  </header>

  <div class="filters">
    <select id="filter-type">
      <option value="">All Types</option>
      <option value="Review">Review</option>
      <option value="PR">PR</option>
      <option value="Workstream">Workstream</option>
      <option value="Issue">Issue</option>
    </select>
    <select id="filter-status">
      <option value="">All Statuses</option>
      <option value="active" selected>Active</option>
      <option value="done">Done</option>
    </select>
    <input type="search" id="filter-search" placeholder="Search..." autocomplete="off">
  </div>

  <table id="todo-table">
    <thead>
      <tr>
        <th data-sort="id">ID</th>
        <th data-sort="description">Description</th>
        <th data-sort="type">Type</th>
        <th data-sort="status">Status</th>
        <th data-sort="priority">Priority</th>
        <th data-sort="due">Due</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="todo-body"></tbody>
  </table>

  <div id="detail-panel" class="detail-panel">
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <button id="detail-close" class="btn-icon">&times;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <div id="update-dialog" class="dialog-overlay hidden">
    <div class="dialog">
      <div class="dialog-header">
        <h2 id="update-dialog-title">Update Results</h2>
        <button id="update-dialog-close" class="btn-icon">&times;</button>
      </div>
      <div id="update-dialog-content"></div>
      <div id="update-dialog-actions" class="dialog-actions hidden">
        <label class="select-all-label">
          <input type="checkbox" id="discovery-select-all" checked> Select all
        </label>
        <div class="dialog-buttons">
          <button id="discovery-skip" class="btn-small">Skip</button>
          <button id="discovery-add" class="btn">Add Selected</button>
        </div>
      </div>
    </div>
  </div>

  <div id="claude-panel" class="claude-panel">
    <div class="claude-input-row">
      <input type="text" id="claude-prompt" placeholder="Ask Claude..." />
      <button id="claude-send" class="btn">Send</button>
    </div>
    <div class="quick-actions">
      <button class="quick-action btn-small" data-prompt="update the status of all open TODOs">Update All</button>
      <button class="quick-action btn-small" data-prompt="update the status of all review requests">Update Reviews</button>
    </div>
    <div id="claude-spinner" class="claude-spinner hidden"><span class="spinner"></span> Thinking...</div>
    <pre id="claude-output" class="hidden"></pre>
  </div>

  <div id="log-dialog" class="dialog-overlay hidden">
    <div class="dialog dialog-wide">
      <div class="dialog-header">
        <h2>Update Log</h2>
        <button id="log-dialog-close" class="btn-icon">&times;</button>
      </div>
      <div id="log-dialog-content" class="log-content"></div>
      <div class="dialog-actions">
        <div class="dialog-buttons">
          <button id="log-load-more" class="btn-small hidden">Load more</button>
          <button id="log-close-btn" class="btn-small">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
